name: Keep-Alive Ping

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: curl -f https://netpulse-server-8z3g.onrender.com/actuator/health || curl -f https://netpulse-server-8z3g.onrender.com/api/targets || echo "Ping failed, but workflow continues"
