services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netpulse
      POSTGRES_USER: netpulse
      POSTGRES_PASSWORD: netpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot backend
  server:
    build: ./netpulse-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/netpulse
      SPRING_DATASOURCE_USERNAME: netpulse
      SPRING_DATASOURCE_PASSWORD: netpulse
    depends_on:
      db:
        condition: service_healthy

  # Go latency agent
  agent:
    build: ./netpulse-agent
    environment:
      NETPULSE_SERVER_URL: http://server:8080
    depends_on:
      - server

  # Next.js frontend
  frontend:
    build: ./netpulse-frontend
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
